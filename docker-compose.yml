name: etsy-saas
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: etsy_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ['5432:5432']
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/001-roles.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d etsy_saas']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports: ['6379:6379']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret
    ports: ['9000:9000', '9001:9001']
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  createbucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 minio minio-secret &&
      mc mb --ignore-existing local/etsy-saas-local"

  migrate:
    build:
      context: .
      target: build
    command: pnpm db:migrate
    environment:
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@postgres:5432/etsy_saas
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build:
      context: .
      target: api
    environment: &app-env
      APP_ENV: development
      LOG_LEVEL: info
      WEB_ORIGIN: http://localhost:8080
      API_PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/etsy_saas
      REDIS_URL: redis://redis:6379
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-local-development-pepper-change-me-123456}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: etsy-saas-local
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-secret
      S3_FORCE_PATH_STYLE: 'true'
      ETSY_INTEGRATION_ENABLED: 'false'
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      createbucket: { condition: service_completed_successfully }
    ports: ['3000:3000']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health/live']
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      target: worker
    environment: *app-env
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  web:
    build:
      context: .
      target: web
    depends_on:
      api: { condition: service_healthy }
    ports: ['8080:80']

volumes:
  postgres-data:
  redis-data:
  minio-data:
